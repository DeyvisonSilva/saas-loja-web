<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cardápio Digital</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container {
            text-align: center;
            color: white;
        }
        h1 { font-size: 3rem; margin-bottom: 20px; }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }
        .btn {
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-primary {
            background: #dc2626;
            color: white;
        }
        .btn-secondary {
            background: white;
            color: #dc2626;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍔 Cardápio Digital</h1>
        <p>Solução completa para seu restaurante</p>
        <div class="buttons">
            <a href="/login/" class="btn btn-primary">Login</a>
            <a href="/signup/" class="btn btn-secondary">Cadastrar Loja</a>
            <a href="/cardapio.html" class="btn btn-secondary">Ver Cardápio</a>
        </div>
    </div>
</body>
</html>
