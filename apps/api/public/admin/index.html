<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sua Loja</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; }
        
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .store-badge { background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; }
        .logout-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: all 0.3s; }
        .logout-btn:hover { background: #dc2626; }
        
        .dashboard { display: flex; min-height: calc(100vh - 72px); }
        .sidebar { width: 280px; background: white; border-right: 1px solid #e5e7eb; padding: 2rem 0; }
        .nav-item { padding: 12px 24px; margin: 4px 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #4b5563; transition: all 0.3s; }
        .nav-item i { width: 24px; }
        .nav-item:hover { background: #f3f4f6; color: #dc2626; }
        .nav-item.active { background: linear-gradient(135deg, #dc2626, #b91c1c); color: white; }
        
        .content { flex: 1; padding: 2rem; overflow-x: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; color: #dc2626; margin-top: 0.5rem; }
        
        .card { background: white; border-radius: 20px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 500; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #dc2626, #b91c1c); color: white; }
        .btn-success { background: #10b981; color: white; }
        .table-container { background: white; border-radius: 20px; padding: 1.5rem; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { font-weight: 600; color: #4b5563; background: #f9fafb; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 20px; padding: 2rem; width: 90%; max-width: 500px; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #e5e7eb; border-radius: 10px; }
        .hidden { display: none; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-paid { background: #d1fae5; color: #059669; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><i class="fas fa-store" style="font-size:1.5rem;"></i><h2>Minha Loja</h2><div class="store-badge" id="storeName"></div></div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
    </div>
    <div class="dashboard">
        <div class="sidebar">
            <div class="nav-item active" onclick="showTab('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
            <div class="nav-item" onclick="showTab('produtos')"><i class="fas fa-pizza-slice"></i> Produtos</div>
            <div class="nav-item" onclick="showTab('categorias')"><i class="fas fa-tags"></i> Categorias</div>
            <div class="nav-item" onclick="showTab('pedidos')"><i class="fas fa-shopping-bag"></i> Pedidos</div>
            <div class="nav-item" onclick="showTab('estoque')"><i class="fas fa-boxes"></i> Estoque</div>
        </div>
        <div class="content">
            <div id="dashboardTab">
                <div class="stats-grid" id="statsGrid"></div>
                <div class="card"><h3>Últimos Pedidos</h3><div id="ultimosPedidos"></div></div>
            </div>
            <div id="produtosTab" class="hidden"><button class="btn btn-primary" onclick="abrirProdutoModal()">+ Novo Produto</button><div class="card" style="margin-top:1rem;"><div id="produtosList"></div></div></div>
            <div id="categoriasTab" class="hidden"><button class="btn btn-primary" onclick="abrirCategoriaModal()">+ Nova Categoria</button><div class="card" style="margin-top:1rem;"><div id="categoriasList"></div></div></div>
            <div id="pedidosTab" class="hidden"><div class="card"><div id="pedidosList"></div></div></div>
            <div id="estoqueTab" class="hidden"><div class="card"><div id="estoqueList"></div></div></div>
        </div>
    </div>

    <div id="produtoModal" class="modal"><div class="modal-content"><h3>Produto</h3><input type="hidden" id="produtoId"><div class="form-group"><label>Nome</label><input type="text" id="produtoNome" required></div><div class="form-group"><label>Preço</label><input type="number" id="produtoPreco" step="0.01"></div><div class="form-group"><label>Estoque</label><input type="number" id="produtoEstoque" value="0"></div><div class="form-group"><label>Categoria</label><select id="produtoCategoria"></select></div><div class="form-group"><label>Imagem URL</label><input type="text" id="produtoImagem"></div><button class="btn btn-primary" onclick="salvarProduto()">Salvar</button><button onclick="fecharProdutoModal()">Cancelar</button></div></div>
    <div id="categoriaModal" class="modal"><div class="modal-content"><h3>Categoria</h3><input type="hidden" id="categoriaId"><div class="form-group"><label>Nome</label><input type="text" id="categoriaNome"></div><div class="form-group"><label>Ordem</label><input type="number" id="categoriaOrdem" value="0"></div><button class="btn btn-primary" onclick="salvarCategoria()">Salvar</button><button onclick="fecharCategoriaModal()">Cancelar</button></div></div>

    <script>
        const TENANT_ID = new URLSearchParams(location.search).get('tenant');
        let categorias = [];

        function getToken() { return localStorage.getItem('token'); }
        function logout() { localStorage.clear(); window.location.href = '/login/'; }

        async function loadDashboard() {
            const pedidos = await fetch(`/pedidos/${TENANT_ID}`).then(r=>r.json());
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><h3>Pedidos Hoje</h3><div class="value">${pedidos.filter(p=>p.createdAt.split('T')[0]===hoje).length}</div></div>
                <div class="stat-card"><h3>Pendentes</h3><div class="value">${pedidos.filter(p=>p.status==='pending').length}</div></div>
                <div class="stat-card"><h3>Total Pedidos</h3><div class="value">${pedidos.length}</div></div>
            `;
            document.getElementById('ultimosPedidos').innerHTML = `<table><thead><tr><th>Cliente</th><th>Total</th><th>Status</th></tr></thead><tbody>${pedidos.slice(0,5).map(p=>`<tr><td>${p.customerName}</td><td>R$ ${p.total}</td><td><span class="status-badge status-${p.status}">${p.status}</span></td></tr>`).join('')}</tbody></table>`;
        }

        async function loadProdutos() {
            const produtos = await fetch(`/cardapio/products/${TENANT_ID}?all=true`).then(r=>r.json());
            document.getElementById('produtosList').innerHTML = `<table><thead><tr><th>Nome</th><th>Preço</th><th>Estoque</th><th>Ações</th></tr></thead><tbody>${produtos.map(p=>`<tr><td>${p.name}</td><td>R$ ${p.price}</td><td>${p.stock}</td><td><button class="btn btn-primary btn-sm" onclick="editarProduto('${p.id}')">Editar</button></td></tr>`).join('')}</tbody></table>`;
        }

        async function loadCategorias() {
            categorias = await fetch(`/cardapio/categories/${TENANT_ID}`).then(r=>r.json());
            document.getElementById('categoriasList').innerHTML = `<table><thead><tr><th>Nome</th><th>Ações</th></tr></thead><tbody>${categorias.map(c=>`<tr><td>${c.name}</td><td><button class="btn btn-primary btn-sm" onclick="editarCategoria('${c.id}')">Editar</button></td></tr>`).join('')}</tbody></table>`;
            document.getElementById('produtoCategoria').innerHTML = '<option value="">Sem categoria</option>' + categorias.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
        }

        async function loadPedidos() {
            const pedidos = await fetch(`/pedidos/${TENANT_ID}`).then(r=>r.json());
            document.getElementById('pedidosList').innerHTML = `<table><thead><tr><th>Cliente</th><th>Total</th><th>Status</th><th>Ações</th></tr></thead><tbody>${pedidos.map(p=>`<tr><td>${p.customerName}</td><td>R$ ${p.total}</td><td><span class="status-badge status-${p.status}">${p.status}</span></td><td><select onchange="atualizarStatus('${p.id}',this.value)"><option value="pending">Pendente</option><option value="paid">Pago</option><option value="preparing">Preparando</option><option value="ready">Pronto</option><option value="delivered">Entregue</option></select></td></tr>`).join('')}</tbody></table>`;
        }

        async function loadEstoque() {
            const produtos = await fetch(`/cardapio/products/${TENANT_ID}?all=true`).then(r=>r.json());
            document.getElementById('estoqueList').innerHTML = `<table><thead><tr><th>Produto</th><th>Estoque</th><th>Ações</th></tr></thead><tbody>${produtos.map(p=>`<tr><td>${p.name}</td><td>${p.stock}</td><td><button class="btn btn-success btn-sm" onclick="addStock('${p.id}')">+ Estoque</button></td></tr>`).join('')}</tbody></table>`;
        }

        async function addStock(id) { let qtd=prompt('Quantidade:'); if(qtd) await fetch(`/cardapio/products/${id}/stock?tenantId=${TENANT_ID}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({quantity:parseInt(qtd)})}); loadProdutos();loadEstoque(); }
        async function atualizarStatus(id,status) { await fetch(`/pedidos/${id}/status?tenantId=${TENANT_ID}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})}); loadPedidos();loadDashboard(); }
        async function salvarProduto() { let id=document.getElementById('produtoId').value; let data={name:document.getElementById('produtoNome').value,price:parseFloat(document.getElementById('produtoPreco').value),stock:parseInt(document.getElementById('produtoEstoque').value),imageUrl:document.getElementById('produtoImagem').value,categoryId:document.getElementById('produtoCategoria').value||null,tenantId:TENANT_ID}; let url=id?`/cardapio/products/${id}?tenantId=${TENANT_ID}`:`/cardapio/products`; await fetch(url,{method:id?'PATCH':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); fecharProdutoModal(); loadProdutos();loadEstoque(); }
        async function editarProduto(id) { let produtos=await fetch(`/cardapio/products/${TENANT_ID}?all=true`).then(r=>r.json()); let p=produtos.find(p=>p.id===id); document.getElementById('produtoId').value=p.id; document.getElementById('produtoNome').value=p.name; document.getElementById('produtoPreco').value=p.price; document.getElementById('produtoEstoque').value=p.stock; document.getElementById('produtoImagem').value=p.imageUrl||''; document.getElementById('produtoCategoria').value=p.categoryId||''; abrirProdutoModal(); }
        async function salvarCategoria() { let id=document.getElementById('categoriaId').value; let data={name:document.getElementById('categoriaNome').value,order:parseInt(document.getElementById('categoriaOrdem').value),tenantId:TENANT_ID}; let url=id?`/cardapio/categories/${id}`:`/cardapio/categories`; await fetch(url,{method:id?'PATCH':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); fecharCategoriaModal(); loadCategorias(); }
        async function editarCategoria(id) { let c=categorias.find(c=>c.id===id); document.getElementById('categoriaId').value=c.id; document.getElementById('categoriaNome').value=c.name; document.getElementById('categoriaOrdem').value=c.order; abrirCategoriaModal(); }
        function abrirProdutoModal() { document.getElementById('produtoModal').style.display='flex'; }
        function fecharProdutoModal() { document.getElementById('produtoModal').style.display='none'; }
        function abrirCategoriaModal() { document.getElementById('categoriaModal').style.display='flex'; }
        function fecharCategoriaModal() { document.getElementById('categoriaModal').style.display='none'; }
        function showTab(tab) { document.querySelectorAll('.content > div').forEach(d=>d.classList.add('hidden')); document.getElementById(`${tab}Tab`).classList.remove('hidden'); document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active')); event.target.closest('.nav-item').classList.add('active'); if(tab==='dashboard') loadDashboard(); if(tab==='produtos') loadProdutos(); if(tab==='categorias') loadCategorias(); if(tab==='pedidos') loadPedidos(); if(tab==='estoque') loadEstoque(); }
        
        document.getElementById('storeName').innerHTML = `<i class="fas fa-store"></i> ${TENANT_ID.substring(0,8)}...`;
        if (!TENANT_ID) window.location.href = '/login/';
        loadDashboard();
    </script>
</body>
</html>
