<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Cardápio Digital</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #dc2626; }
        .link-cardapio { background: #667eea; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-card h3 { font-size: 0.875rem; color: #666; margin-bottom: 10px; }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: #dc2626; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; background: white; border: none; cursor: pointer; border-radius: 8px; }
        .tab.active { background: #dc2626; color: white; }
        .panel { background: white; border-radius: 10px; padding: 20px; display: none; overflow-x: auto; }
        .panel.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f9fafb; }
        select, button { padding: 6px 12px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; }
        .btn { background: #dc2626; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 500px; max-width: 90%; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .status { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; display: inline-block; }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-paid { background: #d1fae5; color: #059669; }
        .status-preparing { background: #dbeafe; color: #2563eb; }
        .status-ready { background: #e0e7ff; color: #4338ca; }
        .status-delivered { background: #d1fae5; color: #059669; }
        .link { color: #dc2626; text-decoration: none; }
        .copy-btn { background: #10b981; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Cardapio Digital - Admin</h1>
            <div>
                <input type="text" id="cardapioLink" style="width: 300px; padding: 8px;" readonly>
                <button class="copy-btn" onclick="copiarLink()">Copiar Link</button>
                <a href="#" id="viewLink" target="_blank" class="link-cardapio">Ver Cardapio</a>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card"><h3>Pedidos Hoje</h3><div class="value" id="statHoje">0</div></div>
            <div class="stat-card"><h3>Pedidos Pendentes</h3><div class="value" id="statPendentes">0</div></div>
            <div class="stat-card"><h3>Faturamento Hoje</h3><div class="value" id="statFaturamento">R$ 0</div></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('pedidos')">Pedidos</button>
            <button class="tab" onclick="showTab('produtos')">Produtos</button>
            <button class="tab" onclick="showTab('categorias')">Categorias</button>
        </div>

        <div id="tabPedidos" class="panel active">
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>ID</th><th>Cliente</th><th>Total</th><th>Status</th><th>Acao</th></tr></thead>
                    <tbody id="listaPedidos"></tbody>
                </table>
            </div>
        </div>

        <div id="tabProdutos" class="panel">
            <button class="btn" onclick="abrirModalProduto()">+ Novo Produto</button>
            <div style="overflow-x: auto; margin-top: 15px;">
                <table>
                    <thead><tr><th>Nome</th><th>Preco</th><th>Estoque</th><th>Acoes</th></tr></thead>
                    <tbody id="listaProdutos"></tbody>
                </table>
            </div>
        </div>

        <div id="tabCategorias" class="panel">
            <button class="btn" onclick="abrirModalCategoria()">+ Nova Categoria</button>
            <div style="overflow-x: auto; margin-top: 15px;">
                <table>
                    <thead><tr><th>Nome</th><th>Ordem</th><th>Acoes</th></tr></thead>
                    <tbody id="listaCategorias"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Produto -->
    <div id="modalProduto" class="modal">
        <div class="modal-content">
            <h3 id="modalProdutoTitulo">Novo Produto</h3>
            <input type="hidden" id="produtoId">
            <div class="form-group"><label>Nome</label><input type="text" id="produtoNome" required></div>
            <div class="form-group"><label>Descricao</label><textarea id="produtoDescricao"></textarea></div>
            <div class="form-group"><label>Preco</label><input type="number" id="produtoPreco" step="0.01" required></div>
            <div class="form-group"><label>Categoria</label><select id="produtoCategoriaId"></select></div>
            <div class="form-group"><label>Estoque</label><input type="number" id="produtoEstoque" value="0"></div>
            <div class="form-group"><label><input type="checkbox" id="produtoDisponivel" checked> Disponivel</label></div>
            <button class="btn" onclick="salvarProduto()">Salvar</button>
            <button onclick="fecharModalProduto()">Cancelar</button>
        </div>
    </div>

    <!-- Modal Categoria -->
    <div id="modalCategoria" class="modal">
        <div class="modal-content">
            <h3>Nova Categoria</h3>
            <input type="hidden" id="categoriaId">
            <div class="form-group"><label>Nome</label><input type="text" id="categoriaNome" required></div>
            <div class="form-group"><label>Ordem</label><input type="number" id="categoriaOrdem" value="0"></div>
            <button class="btn" onclick="salvarCategoria()">Salvar</button>
            <button onclick="fecharModalCategoria()">Cancelar</button>
        </div>
    </div>

    <script>
        const API_URL = "";
        const urlParams = new URLSearchParams(window.location.search);
        const TENANT_ID = urlParams.get('tenant') || localStorage.getItem('tenantId');

        if (!TENANT_ID) {
            window.location.href = '/login/';
        }

        function copiarLink() {
            const input = document.getElementById('cardapioLink');
            input.select();
            document.execCommand('copy');
            alert('Link copiado!');
        }

        function loadCardapioLink() {
            const link = `${window.location.protocol}//${window.location.host}/cardapio.html?tenant=${TENANT_ID}`;
            document.getElementById('cardapioLink').value = link;
            document.getElementById('viewLink').href = link;
        }

        async function loadDashboard() {
            try {
                const pedidos = await fetch(`${API_URL}/pedidos/${TENANT_ID}`).then(r => r.json());
                const hoje = new Date().toISOString().split('T')[0];
                const pedidosHoje = pedidos.filter(p => p.createdAt.split('T')[0] === hoje);
                const pendentes = pedidos.filter(p => p.status === 'pending');
                const faturamento = pedidosHoje.filter(p => p.status === 'paid').reduce((s, p) => s + p.total, 0);
                document.getElementById('statHoje').innerText = pedidosHoje.length;
                document.getElementById('statPendentes').innerText = pendentes.length;
                document.getElementById('statFaturamento').innerText = `R$ ${faturamento.toFixed(2)}`;
            } catch(e) { console.error(e); }
        }

        async function loadPedidos() {
            try {
                const pedidos = await fetch(`${API_URL}/pedidos/${TENANT_ID}`).then(r => r.json());
                const statusLabels = { pending: 'Pendente', paid: 'Pago', preparing: 'Preparando', ready: 'Pronto', delivered: 'Entregue' };
                document.getElementById('listaPedidos').innerHTML = pedidos.map(p => `
                    <tr>
                        <td>${p.id.substring(0,8)}</td>
                        <td>${p.customerName}<br><small>${p.customerPhone}</small></td>
                        <td>R$ ${p.total}</td>
                        <td><span class="status status-${p.status}">${statusLabels[p.status]}</span></td>
                        <td>
                            <select onchange="updateStatus('${p.id}', this.value)">
                                <option value="pending" ${p.status==='pending'?'selected':''}>Pendente</option>
                                <option value="paid" ${p.status==='paid'?'selected':''}>Pago</option>
                                <option value="preparing" ${p.status==='preparing'?'selected':''}>Preparando</option>
                                <option value="ready" ${p.status==='ready'?'selected':''}>Pronto</option>
                                <option value="delivered" ${p.status==='delivered'?'selected':''}>Entregue</option>
                            </select>
                        </td>
                    </tr>
                `).join('');
            } catch(e) { console.error(e); }
        }

        async function updateStatus(orderId, status) {
            try {
                await fetch(`${API_URL}/pedidos/${orderId}/status?tenantId=${TENANT_ID}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                loadPedidos();
                loadDashboard();
            } catch(e) { alert('Erro ao atualizar'); }
        }

        async function loadProdutos() {
            try {
                const produtos = await fetch(`${API_URL}/cardapio/products/${TENANT_ID}?all=true`).then(r => r.json());
                document.getElementById('listaProdutos').innerHTML = produtos.map(p => `
                    <tr>
                        <td>${p.name}</td>
                        <td>R$ ${p.price}</td>
                        <td>${p.stock}</td>
                        <td><button onclick="editarProduto('${p.id}')">Editar</button> <button onclick="excluirProduto('${p.id}')">Excluir</button></td>
                    </tr>
                `).join('');
            } catch(e) { console.error(e); }
        }

        async function loadCategorias() {
            try {
                const categorias = await fetch(`${API_URL}/cardapio/categories/${TENANT_ID}`).then(r => r.json());
                document.getElementById('listaCategorias').innerHTML = categorias.map(c => `
                    <tr>
                        <td>${c.name}</td>
                        <td>${c.order}</td>
                        <td><button onclick="editarCategoria('${c.id}')">Editar</button> <button onclick="excluirCategoria('${c.id}')">Excluir</button></td>
                    </tr>
                `).join('');
                const select = document.getElementById('produtoCategoriaId');
                if(select) select.innerHTML = '<option value="">Sem categoria</option>' + categorias.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            } catch(e) { console.error(e); }
        }

        async function salvarProduto() {
            const id = document.getElementById('produtoId').value;
            const data = {
                name: document.getElementById('produtoNome').value,
                description: document.getElementById('produtoDescricao').value,
                price: parseFloat(document.getElementById('produtoPreco').value),
                stock: parseInt(document.getElementById('produtoEstoque').value),
                isAvailable: document.getElementById('produtoDisponivel').checked,
                tenantId: TENANT_ID,
                categoryId: document.getElementById('produtoCategoriaId').value || null
            };
            const url = id ? `${API_URL}/cardapio/products/${id}?tenantId=${TENANT_ID}` : `${API_URL}/cardapio/products`;
            const method = id ? 'PATCH' : 'POST';
            await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            fecharModalProduto();
            loadProdutos();
        }

        async function excluirProduto(id) {
            if(confirm('Excluir produto?')) {
                await fetch(`${API_URL}/cardapio/products/${id}?tenantId=${TENANT_ID}`, { method: 'DELETE' });
                loadProdutos();
            }
        }

        async function editarProduto(id) {
            const produtos = await fetch(`${API_URL}/cardapio/products/${TENANT_ID}?all=true`).then(r => r.json());
            const p = produtos.find(p => p.id === id);
            document.getElementById('produtoId').value = p.id;
            document.getElementById('produtoNome').value = p.name;
            document.getElementById('produtoDescricao').value = p.description || '';
            document.getElementById('produtoPreco').value = p.price;
            document.getElementById('produtoEstoque').value = p.stock;
            document.getElementById('produtoDisponivel').checked = p.isAvailable;
            document.getElementById('produtoCategoriaId').value = p.categoryId || '';
            document.getElementById('modalProdutoTitulo').innerText = 'Editar Produto';
            document.getElementById('modalProduto').style.display = 'flex';
        }

        function abrirModalProduto() {
            document.getElementById('produtoId').value = '';
            document.getElementById('produtoNome').value = '';
            document.getElementById('produtoDescricao').value = '';
            document.getElementById('produtoPreco').value = '';
            document.getElementById('produtoEstoque').value = '0';
            document.getElementById('produtoDisponivel').checked = true;
            document.getElementById('modalProdutoTitulo').innerText = 'Novo Produto';
            document.getElementById('modalProduto').style.display = 'flex';
        }

        function fecharModalProduto() { document.getElementById('modalProduto').style.display = 'none'; }

        async function salvarCategoria() {
            const id = document.getElementById('categoriaId').value;
            const data = { name: document.getElementById('categoriaNome').value, order: parseInt(document.getElementById('categoriaOrdem').value), tenantId: TENANT_ID };
            const url = id ? `${API_URL}/cardapio/categories/${id}` : `${API_URL}/cardapio/categories`;
            const method = id ? 'PATCH' : 'POST';
            await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            fecharModalCategoria();
            loadCategorias();
        }

        async function editarCategoria(id) {
            const categorias = await fetch(`${API_URL}/cardapio/categories/${TENANT_ID}`).then(r => r.json());
            const c = categorias.find(c => c.id === id);
            document.getElementById('categoriaId').value = c.id;
            document.getElementById('categoriaNome').value = c.name;
            document.getElementById('categoriaOrdem').value = c.order;
            document.getElementById('modalCategoria').style.display = 'flex';
        }

        async function excluirCategoria(id) {
            if(confirm('Excluir categoria?')) {
                await fetch(`${API_URL}/cardapio/categories/${id}`, { method: 'DELETE' });
                loadCategorias();
                loadProdutos();
            }
        }

        function abrirModalCategoria() {
            document.getElementById('categoriaId').value = '';
            document.getElementById('categoriaNome').value = '';
            document.getElementById('categoriaOrdem').value = '0';
            document.getElementById('modalCategoria').style.display = 'flex';
        }

        function fecharModalCategoria() { document.getElementById('modalCategoria').style.display = 'none'; }

        function showTab(tab) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if(tab === 'pedidos') { loadPedidos(); loadDashboard(); }
            if(tab === 'produtos') loadProdutos();
            if(tab === 'categorias') loadCategorias();
        }

        loadCardapioLink();
        loadDashboard();
        loadPedidos();
        loadCategorias();
    </script>
</body>
</html>
