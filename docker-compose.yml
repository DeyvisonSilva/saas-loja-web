version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: loja-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: loja_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: loja-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: